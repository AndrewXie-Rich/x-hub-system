name: Source File Size Budget

on:
  pull_request:
    paths:
      - "rust/xhubd/**"
      - "x-hub/macos/RELFlowHub/Sources/**"
      - "x-terminal/Sources/**"
      - "scripts/check_source_file_size_budget.py"
      - "scripts/source_file_size_budget.v1.json"
      - ".github/workflows/source-file-size-budget.yml"
  push:
    branches:
      - main
    paths:
      - "rust/xhubd/**"
      - "x-hub/macos/RELFlowHub/Sources/**"
      - "x-terminal/Sources/**"
      - "scripts/check_source_file_size_budget.py"
      - "scripts/source_file_size_budget.v1.json"
      - ".github/workflows/source-file-size-budget.yml"
  workflow_dispatch:

jobs:
  source-file-size-budget:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check source file size budget
        run: |
          python3 ./scripts/check_source_file_size_budget.py
