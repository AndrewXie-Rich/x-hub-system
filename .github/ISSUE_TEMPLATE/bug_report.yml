name: Bug report
description: Report a reproducible defect in X-Hub or X-Terminal
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting.

        Please provide enough detail for reproduction. If this might be security-sensitive, stop here and use the process in `SECURITY.md` instead of posting exploit details publicly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
      placeholder: A clear and concise description
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, version, and runtime/toolchain details
      placeholder: |
        - OS:
        - X-Hub version/tag:
        - X-Terminal version/tag:
        - Node/Python/Swift versions:
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps and inputs
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and evidence
      description: Paste relevant logs, errors, screenshots, or evidence references with secrets removed
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I removed secrets and private credentials from logs.
          required: true
        - label: This report does not include a private security vulnerability disclosure.
          required: true
