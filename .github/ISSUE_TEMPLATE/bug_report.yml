name: Bug report
description: Report a reproducible defect
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please provide enough detail for reproduction.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
      placeholder: A clear and concise description
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, version, runtime/toolchain details
      placeholder: |
        - OS:
        - X-Hub version/tag:
        - Node/Python/Swift versions:
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps and inputs
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and evidence
      description: Paste relevant logs, errors, or evidence refs
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I removed secrets and private credentials from logs.
          required: true

