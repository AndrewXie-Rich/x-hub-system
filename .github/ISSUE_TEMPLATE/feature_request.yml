name: Feature request
description: Suggest an improvement or new capability
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the user value and expected outcome.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: Current pain point
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What do you want to happen?
      placeholder: Suggested behavior or interface
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional alternatives or tradeoffs
      placeholder: Other approaches you evaluated
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Affected modules, risks, and migration impact
      placeholder: |
        - Modules:
        - Risk level:
        - Breaking changes:
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This request does not include private or secret information.
          required: true

