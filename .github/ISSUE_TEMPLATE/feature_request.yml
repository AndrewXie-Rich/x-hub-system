name: Feature request
description: Suggest an improvement or new capability for X-Hub or X-Terminal
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the user value and expected outcome.

        For product-facing requests, keep the difference between `x-hub/` and `x-terminal/` in mind: trust, grants, and final policy authority belong in the Hub.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve, and for whom?
      placeholder: Current pain point
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What do you want to happen?
      placeholder: Suggested behavior or interface
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional alternatives or tradeoffs
      placeholder: Other approaches you evaluated
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Affected modules, risks, migration impact, and whether the change touches Hub trust boundaries
      placeholder: |
        - Modules:
        - Risk level:
        - Breaking changes:
        - Trust/policy impact:
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This request does not include private or secret information.
          required: true
        - label: I understand that public claims and release scope are narrower than the full internal document set.
          required: false
