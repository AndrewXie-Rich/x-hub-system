version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: npm
    directory: /x-hub/grpc-server/hub_grpc_server
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm

  - package-ecosystem: swift
    directory: /x-hub/macos/RELFlowHub
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - swift

  - package-ecosystem: swift
    directory: /x-terminal
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - swift

