<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 860" role="img" aria-labelledby="title desc">
  <title id="title">X-Hub Trust And Control Plane</title>
  <desc id="desc">A simplified architecture diagram showing client ingress, the X-Hub governance core, governed execution surfaces, and fail-closed audit feedback.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#475569" />
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#1f7a4d" />
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#b42318" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 24; ry: 24; }
      .hub-panel { fill: #f5fbf7; stroke: #6aa37d; stroke-width: 1.8; rx: 24; ry: 24; }
      .exec-panel { fill: #fffaf2; stroke: #d4a048; stroke-width: 1.5; rx: 24; ry: 24; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 16; ry: 16; }
      .client-card { fill: #f0fdf4; stroke: #5ca77a; stroke-width: 1.4; rx: 16; ry: 16; }
      .ingress-card { fill: #fff7ed; stroke: #d99b55; stroke-width: 1.4; rx: 16; ry: 16; }
      .policy-card { fill: #fff5f5; stroke: #d77b7b; stroke-width: 1.4; rx: 16; ry: 16; }
      .truth-card { fill: #eef7ff; stroke: #7aa7d9; stroke-width: 1.4; rx: 16; ry: 16; }
      .fail-card { fill: #fff1f2; stroke: #c2410c; stroke-width: 1.5; rx: 16; ry: 16; }
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 14px Arial, sans-serif; fill: #475569; }
      .panel-title { font: 700 13px Arial, sans-serif; letter-spacing: 0.12em; fill: #475569; }
      .card-title { font: 700 16px Arial, sans-serif; fill: #1f2937; }
      .card-copy { font: 500 12.5px Arial, sans-serif; fill: #475569; }
      .note { font: 500 13px Arial, sans-serif; fill: #64748b; }
      .flow { fill: none; stroke: #475569; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .flow-green { fill: none; stroke: #1f7a4d; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-green); }
      .flow-red { fill: none; stroke: #b42318; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-red); }
      .flow-soft { fill: none; stroke: #94a3b8; stroke-width: 1.7; stroke-dasharray: 7 7; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="860" />

  <text class="title" x="54" y="48">X-Hub Trust And Control Plane</text>
  <text class="subtitle" x="54" y="74">Clients can ask. The Hub decides. Execution surfaces act only after governance, and runtime truth returns to the Hub.</text>

  <rect class="panel" x="40" y="110" width="330" height="650" />
  <text class="panel-title" x="66" y="146">CLIENTS / INGRESS</text>

  <rect class="client-card" x="68" y="180" width="274" height="112" />
  <text class="card-title" x="92" y="216">X-Terminal</text>
  <text class="card-copy" x="92" y="242">paired deep client</text>
  <text class="card-copy" x="92" y="264">project sync / Supervisor / runtime UX</text>

  <rect class="card" x="68" y="326" width="274" height="112" />
  <text class="card-title" x="92" y="362">Generic client</text>
  <text class="card-copy" x="92" y="388">terminal, CLI, or API caller</text>
  <text class="card-copy" x="92" y="410">consumes governed capabilities</text>

  <rect class="ingress-card" x="68" y="472" width="274" height="128" />
  <text class="card-title" x="92" y="508">Operator ingress</text>
  <text class="card-copy" x="92" y="534">channels / voice / mobile confirmation</text>
  <text class="card-copy" x="92" y="556">authz, replay, and intent gates first</text>

  <rect class="card" x="68" y="632" width="274" height="82" />
  <text class="card-copy" x="92" y="666">Green path: paired trusted session</text>
  <text class="card-copy" x="92" y="692">Gray path: governed capability call</text>

  <rect class="hub-panel" x="410" y="110" width="610" height="650" />
  <text class="panel-title" x="438" y="146">X-HUB GOVERNANCE CORE</text>

  <rect class="truth-card" x="444" y="178" width="246" height="82" />
  <text class="card-title" x="468" y="212">Identity + pairing</text>
  <text class="card-copy" x="468" y="236">device trust / API auth / ingress profile</text>

  <rect class="truth-card" x="734" y="178" width="246" height="82" />
  <text class="card-title" x="758" y="212">Memory truth</text>
  <text class="card-copy" x="758" y="236">constitution / project context / Writer + Gate</text>

  <rect class="policy-card" x="444" y="296" width="246" height="88" />
  <text class="card-title" x="468" y="330">Policy + grants</text>
  <text class="card-copy" x="468" y="354">authorization / risk / kill switch</text>

  <rect class="card" x="734" y="296" width="246" height="88" />
  <text class="card-title" x="758" y="330">Provider accounts</text>
  <text class="card-copy" x="758" y="354">OAuth / keys / quotas / reset windows</text>

  <rect class="card" x="444" y="420" width="246" height="88" />
  <text class="card-title" x="468" y="454">Skill trust</text>
  <text class="card-copy" x="468" y="478">manifests / pins / review / revoke</text>

  <rect class="card" x="734" y="420" width="246" height="88" />
  <text class="card-title" x="758" y="454">Model + capability router</text>
  <text class="card-copy" x="758" y="478">local, paid, tools, skills, connectors</text>

  <rect class="truth-card" x="444" y="546" width="536" height="82" />
  <text class="card-title" x="468" y="580">Audit + evidence + runtime truth</text>
  <text class="card-copy" x="468" y="604">actual route, fallback, downgrade, deny reason</text>
  <text class="card-copy" x="468" y="622">quota state, recovery signal, and evidence refs</text>

  <rect class="fail-card" x="444" y="656" width="536" height="62" />
  <text class="card-title" x="468" y="684">Fail closed before side effects</text>
  <text class="card-copy" x="468" y="706">missing identity, grant, readiness, or route truth stops execution</text>

  <rect class="exec-panel" x="1060" y="110" width="340" height="650" />
  <text class="panel-title" x="1086" y="146">GOVERNED EXECUTION SURFACES</text>

  <rect class="card" x="1090" y="188" width="280" height="74" />
  <text class="card-title" x="1114" y="220">X-Terminal tools</text>
  <text class="card-copy" x="1114" y="244">device actions and local permission owner</text>

  <rect class="card" x="1090" y="302" width="280" height="74" />
  <text class="card-title" x="1114" y="334">Local models + runtime</text>
  <text class="card-copy" x="1114" y="358">local inference under Hub routing</text>

  <rect class="card" x="1090" y="416" width="280" height="74" />
  <text class="card-title" x="1114" y="448">Paid model APIs</text>
  <text class="card-copy" x="1114" y="472">provider usage stays visible to Hub</text>

  <rect class="card" x="1090" y="530" width="280" height="74" />
  <text class="card-title" x="1114" y="562">Skills + connectors</text>
  <text class="card-copy" x="1114" y="586">runner actions after manifest and grant checks</text>

  <text class="note" x="1092" y="672">Execution surfaces can be powerful.</text>
  <text class="note" x="1092" y="696">They do not become the trust root.</text>

  <path class="flow-green" d="M 342 236 C 386 236, 398 219, 444 219" />
  <path class="flow" d="M 342 382 C 390 382, 396 229, 444 229" />
  <path class="flow" d="M 342 536 C 388 536, 398 240, 444 240" />

  <path class="flow" d="M 690 220 L 734 220" />
  <path class="flow" d="M 567 260 L 567 296" />
  <path class="flow" d="M 857 260 L 857 296" />
  <path class="flow" d="M 690 340 L 734 340" />
  <path class="flow" d="M 567 384 L 567 420" />
  <path class="flow" d="M 857 384 L 857 420" />
  <path class="flow" d="M 690 464 L 734 464" />
  <path class="flow" d="M 857 508 L 857 546" />
  <path class="flow" d="M 567 508 L 567 546" />

  <path class="flow" d="M 980 456 C 1024 456, 1040 226, 1090 226" />
  <path class="flow" d="M 980 462 C 1028 462, 1040 340, 1090 340" />
  <path class="flow" d="M 980 468 C 1030 468, 1040 454, 1090 454" />
  <path class="flow" d="M 980 474 C 1030 474, 1040 568, 1090 568" />

  <path class="flow-soft" d="M 1090 244 C 1030 620, 1030 584, 980 584" />
  <path class="flow-soft" d="M 1090 358 C 1038 622, 1030 592, 980 592" />
  <path class="flow-soft" d="M 1090 472 C 1038 624, 1030 600, 980 600" />
  <path class="flow-soft" d="M 1090 586 C 1038 626, 1030 608, 980 608" />

</svg>
