<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 860" role="img" aria-labelledby="title desc">
  <title id="title">X-Hub Governed Capability Map</title>
  <desc id="desc">A capability map showing the major model, memory, skills, quota, terminal, channel, supervisor, and audit surfaces X-Hub is designed to govern.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#64748b" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .core { fill: #f5fbf7; stroke: #5e9b73; stroke-width: 2; rx: 28; ry: 28; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.3; rx: 18; ry: 18; }
      .card-green { fill: #effcf3; stroke: #68a87d; stroke-width: 1.4; rx: 18; ry: 18; }
      .card-blue { fill: #eff6ff; stroke: #7aa7d9; stroke-width: 1.4; rx: 18; ry: 18; }
      .card-amber { fill: #fff7ed; stroke: #d89b55; stroke-width: 1.4; rx: 18; ry: 18; }
      .card-red { fill: #fff5f5; stroke: #d77b7b; stroke-width: 1.4; rx: 18; ry: 18; }
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 14px Arial, sans-serif; fill: #475569; }
      .core-title { font: 700 24px Arial, sans-serif; fill: #14532d; text-anchor: middle; }
      .core-copy { font: 600 14px Arial, sans-serif; fill: #335c48; text-anchor: middle; }
      .card-title { font: 700 16px Arial, sans-serif; fill: #1f2937; }
      .card-copy { font: 500 12.5px Arial, sans-serif; fill: #475569; }
      .note { font: 600 13px Arial, sans-serif; fill: #64748b; }
      .flow { fill: none; stroke: #64748b; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); opacity: 0.78; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="860" />

  <text class="title" x="54" y="48">What X-Hub Can Govern</text>
  <text class="subtitle" x="54" y="74">The product value is the control plane: model, memory, skill, quota, execution, channel, supervision, and audit surfaces converge through one Hub authority.</text>

  <rect class="core" x="480" y="260" width="480" height="270" />
  <text class="core-title" x="720" y="316">X-Hub Governance Core</text>
  <text class="core-copy" x="720" y="354">trust root / route truth / memory truth</text>
  <text class="core-copy" x="720" y="382">policy / grants / readiness / kill switch</text>
  <text class="core-copy" x="720" y="410">audit / evidence / runtime truth</text>
  <text class="core-copy" x="720" y="450">clients and runtimes stay useful</text>
  <text class="core-copy" x="720" y="478">without becoming sovereign control planes</text>

  <rect class="card-green" x="70" y="130" width="294" height="112" />
  <text class="card-title" x="98" y="166">Model routing</text>
  <text class="card-copy" x="98" y="194">local models and paid APIs</text>
  <text class="card-copy" x="98" y="216">actual route, fallback, downgrade truth</text>

  <rect class="card-amber" x="410" y="130" width="294" height="112" />
  <text class="card-title" x="438" y="166">Provider accounts + quotas</text>
  <text class="card-copy" x="438" y="194">OAuth / keys / free and paid accounts</text>
  <text class="card-copy" x="438" y="216">5h / 7d usage windows and reset state</text>

  <rect class="card-blue" x="750" y="130" width="294" height="112" />
  <text class="card-title" x="778" y="166">Memory + constitution</text>
  <text class="card-copy" x="778" y="194">Hub-backed truth and policy guidance</text>
  <text class="card-copy" x="778" y="216">durable writes bounded to Writer + Gate</text>

  <rect class="card-green" x="1088" y="130" width="294" height="112" />
  <text class="card-title" x="1116" y="166">Governed skills</text>
  <text class="card-copy" x="1116" y="194">manifests / trust roots / package pins</text>
  <text class="card-copy" x="1116" y="216">preflight, grants, deny, revoke, audit</text>

  <rect class="card" x="70" y="330" width="294" height="112" />
  <text class="card-title" x="98" y="366">Terminal + device execution</text>
  <text class="card-copy" x="98" y="394">X-Terminal as paired deep client</text>
  <text class="card-copy" x="98" y="416">local permission owner remains explicit</text>

  <rect class="card-red" x="1088" y="330" width="294" height="112" />
  <text class="card-title" x="1116" y="366">Policy + fail-closed gates</text>
  <text class="card-copy" x="1116" y="394">identity, grant, bridge, readiness checks</text>
  <text class="card-copy" x="1116" y="416">missing evidence blocks side effects</text>

  <rect class="card-blue" x="70" y="558" width="294" height="112" />
  <text class="card-title" x="98" y="594">Supervisor + autonomy</text>
  <text class="card-copy" x="98" y="622">A-Tier, S-Tier, heartbeat, review</text>
  <text class="card-copy" x="98" y="644">higher autonomy with continuing control</text>

  <rect class="card-amber" x="410" y="558" width="294" height="112" />
  <text class="card-title" x="438" y="594">Operator channels</text>
  <text class="card-copy" x="438" y="622">Slack / Telegram / Feishu / voice</text>
  <text class="card-copy" x="438" y="644">authz, replay guard, challenge flows</text>

  <rect class="card" x="750" y="558" width="294" height="112" />
  <text class="card-title" x="778" y="594">Local runtime + connectors</text>
  <text class="card-copy" x="778" y="622">local inference, tools, external services</text>
  <text class="card-copy" x="778" y="644">attached boundaries, not trust roots</text>

  <rect class="card-blue" x="1088" y="558" width="294" height="112" />
  <text class="card-title" x="1116" y="594">Audit + runtime truth</text>
  <text class="card-copy" x="1116" y="622">evidence refs, denial reasons, route truth</text>
  <text class="card-copy" x="1116" y="644">operator-visible recovery diagnostics</text>

  <path class="flow" d="M 364 196 C 430 196, 466 285, 518 316" />
  <path class="flow" d="M 557 242 C 560 270, 574 284, 606 302" />
  <path class="flow" d="M 897 242 C 884 272, 856 286, 828 302" />
  <path class="flow" d="M 1088 196 C 1018 204, 984 284, 922 316" />

  <path class="flow" d="M 364 386 C 414 386, 442 386, 480 386" />
  <path class="flow" d="M 1088 386 C 1038 386, 1008 386, 960 386" />

  <path class="flow" d="M 364 614 C 430 610, 470 510, 528 470" />
  <path class="flow" d="M 557 558 C 572 530, 596 510, 622 494" />
  <path class="flow" d="M 897 558 C 878 530, 852 510, 824 494" />
  <path class="flow" d="M 1088 614 C 1014 606, 978 506, 918 470" />

  <text class="note" x="70" y="748">The differentiator is not a single feature. It is that these surfaces can share one reviewable, user-owned authority boundary.</text>
</svg>
