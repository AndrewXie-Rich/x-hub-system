  rpc DownloadSkillPackage(DownloadSkillPackageRequest) returns (stream SkillPackageChunk);
}

service HubAdmin {
  rpc SetKillSwitch(SetKillSwitchRequest) returns (SetKillSwitchResponse);
  rpc GetKillSwitch(GetKillSwitchRequest) returns (GetKillSwitchResponse);
}
