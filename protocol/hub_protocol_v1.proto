  string request_id = 1; // idempotency key (strict replay: tool_request_id/tool_name/tool_args_hash/exec_argv/exec_cwd/grant_id must stay identical, else request_tampered)
  ClientIdentity client = 2;
  string session_id = 3;
  string tool_request_id = 4;
  string tool_name = 5;
  string tool_args_hash = 6;
  string grant_id = 7;
  repeated string exec_argv = 8; // exact argv provided by runtime before execute
