syntax = "proto3";

package ax.hub.v1;

// NOTE: This proto is the canonical schema for the Hub Remote Protocol (Draft v1).
// HTTP/JSON and WebSocket payloads should map 1:1 to these messages where practical.
//
// File: protocol/hub_protocol_v1.proto
// Doc:  protocol/hub_protocol_v1.md

// -------------------- Common --------------------

message ClientIdentity {
  // Stable IDs used for policy + audit aggregation.
  string device_id = 1;
  string user_id = 2;
  string app_id = 3;
  string project_id = 4;
  string session_id = 5;
}

message Usage {
  int64 prompt_tokens = 1;
  int64 completion_tokens = 2;
  int64 total_tokens = 3;
  double cost_usd_estimate = 4; // optional
}

message Error {
  string code = 1;       // e.g. "grant_required", "quota_exceeded", "kill_switch_active"
  string message = 2;
  bool retryable = 3;
}

// -------------------- Models --------------------

enum ModelKind {
  MODEL_KIND_UNSPECIFIED = 0;
  MODEL_KIND_LOCAL_OFFLINE = 1;
  MODEL_KIND_PAID_ONLINE = 2;
}

enum ModelVisibility {
  MODEL_VISIBILITY_UNSPECIFIED = 0;
  MODEL_VISIBILITY_AVAILABLE = 1;
  MODEL_VISIBILITY_REQUESTABLE = 2;
  MODEL_VISIBILITY_DENIED = 3;
}

message ModelInfo {
  string model_id = 1;
  string name = 2;
  ModelKind kind = 3;
  string backend = 4;         // "mlx|openai|anthropic|gemini|openai_compatible|..."
  int32 context_length = 5;   // tokens
  ModelVisibility visibility = 6;
  bool requires_grant = 7;
  int64 updated_at_ms = 8;
}

message ListModelsRequest {
  ClientIdentity client = 1;
}

message ListModelsResponse {
  int64 updated_at_ms = 1;
  repeated ModelInfo models = 2;
}

// -------------------- Grants / Permissions --------------------

enum Capability {
  CAPABILITY_UNSPECIFIED = 0;
  CAPABILITY_AI_GENERATE_LOCAL = 1;
  CAPABILITY_AI_GENERATE_PAID = 2;
  CAPABILITY_WEB_FETCH = 3;
  CAPABILITY_AI_EMBED_LOCAL = 4;
  CAPABILITY_AI_AUDIO_LOCAL = 5;
  CAPABILITY_AI_VISION_LOCAL = 6;
}

enum GrantDecisionType {
  GRANT_DECISION_UNSPECIFIED = 0;
  GRANT_DECISION_QUEUED = 1;
  GRANT_DECISION_APPROVED = 2;
  GRANT_DECISION_DENIED = 3;
  GRANT_DECISION_REVOKED = 4;
}

message GrantRequest {
  string grant_request_id = 1;
  string request_id = 2; // client idempotency id
  ClientIdentity client = 3;
  Capability capability = 4;
  string model_id = 5; // required for CAPABILITY_AI_GENERATE_PAID
  string reason = 6;
  int32 requested_ttl_sec = 7;
  int64 requested_token_cap = 8;
  int64 created_at_ms = 9;
}

message Grant {
  string grant_id = 1;
  ClientIdentity client = 2;
  Capability capability = 3;
  string model_id = 4;
  int64 token_cap = 5;
  int64 token_used = 6;
  int64 expires_at_ms = 7;
  string status = 8; // "active|expired|revoked"
}

message RequestGrantResponse {
  string grant_request_id = 1;
  GrantDecisionType decision = 2;
  Grant grant = 3; // present when approved immediately
  string deny_reason = 4; // present when denied
}

message ApproveGrantRequest {
  string grant_request_id = 1;
  int32 ttl_sec = 2;       // admin may downscope
  int64 token_cap = 3;     // admin may downscope
  string approver_id = 4;
  string note = 5;
}

message ApproveGrantResponse {
  Grant grant = 1;
}

message DenyGrantRequest {
  string grant_request_id = 1;
  string approver_id = 2;
  string reason = 3;
}

message DenyGrantResponse {
  string grant_request_id = 1;
}

message RevokeGrantRequest {
  string grant_id = 1;
  string approver_id = 2;
  string reason = 3;
}

message RevokeGrantResponse {
  string grant_id = 1;
}

// -------------------- AI Generate (Streaming) --------------------

message ChatMessage {
  string role = 1;    // "system|user|assistant|tool"
  string content = 2;
}

message GenerateRequest {
  string request_id = 1;
  ClientIdentity client = 2;
  string model_id = 3;
  repeated ChatMessage messages = 4;
  int32 max_tokens = 5;
  double temperature = 6;
  double top_p = 7;
  bool stream = 8;
  int64 created_at_ms = 9;
  // Optional: when present, Hub MAY persist turns and build a token-efficient prompt using Hub memory.
  string thread_id = 10;
  int32 working_set_limit = 11;
  // Optional: when true, Hub MUST deny instead of silently downgrading a blocked remote request to a local model.
  bool fail_closed_on_downgrade = 12;
}

message GenerateStart {
  string request_id = 1;
  string model_id = 2;
  int64 started_at_ms = 3;
}

message GenerateDelta {
  string request_id = 1;
  int64 seq = 2;
  string text = 3;
}

message GenerateDone {
  string request_id = 1;
  bool ok = 2;
  string reason = 3;
  Usage usage = 4;
  int64 finished_at_ms = 5;
}

message GenerateError {
  string request_id = 1;
  Error error = 2;
}

message GenerateEvent {
  oneof ev {
    GenerateStart start = 1;
    GenerateDelta delta = 2;
    GenerateDone done = 3;
    GenerateError error = 4;
  }
}

message CancelRequest {
  string request_id = 1;
  ClientIdentity client = 2;
  string reason = 3;
}

message CancelResponse {
  string request_id = 1;
  bool ok = 2;
}

// -------------------- Web Fetch (Streaming optional) --------------------

message FetchRequest {
  string request_id = 1;
  ClientIdentity client = 2;
  string url = 3;
  string method = 4; // "GET" (MVP)
  map<string, string> headers = 5;
  int32 timeout_sec = 6;
  int32 max_bytes = 7;
  int64 created_at_ms = 8;
  bool stream = 9;
}

message FetchStart {
  string request_id = 1;
  string url = 2;
  int64 started_at_ms = 3;
}

message FetchChunk {
  string request_id = 1;
  int64 seq = 2;
  bytes data = 3;
}

message FetchDone {
  string request_id = 1;
  bool ok = 2;
  int32 status = 3;
  string final_url = 4;
  string content_type = 5;
  bool truncated = 6;
  int64 bytes = 7;
  string text = 8; // when non-streaming / small payloads
  int64 finished_at_ms = 9;
  Error error = 10; // when ok=false
}

message FetchEvent {
  oneof ev {
    FetchStart start = 1;
    FetchChunk chunk = 2;
    FetchDone done = 3;
  }
}

// -------------------- Hub Push Events --------------------

message ModelsUpdated {
  int64 updated_at_ms = 1;
  repeated ModelInfo models = 2; // optional; server may omit for "refetch"
}

message GrantDecision {
  string grant_request_id = 1;
  GrantDecisionType decision = 2;
  Grant grant = 3;
  string deny_reason = 4;
  ClientIdentity client = 5;
}

message QuotaUpdated {
  string scope = 1; // e.g. "device:<id>" or "user:<id>"
  int64 daily_token_cap = 2;
  int64 daily_token_used = 3;
  int64 updated_at_ms = 4;
}

message KillSwitchUpdated {
  string scope = 1; // "device:<id>|user:<id>|project:<id>"
  bool models_disabled = 2;
  bool network_disabled = 3;
  string reason = 4;
  int64 updated_at_ms = 5;
  repeated string disabled_local_capabilities = 6;
  repeated string disabled_local_providers = 7;
}

message RequestStatus {
  string request_id = 1;
  string status = 2; // "running|done|failed|canceled|terminated"
  int64 updated_at_ms = 3;
  Error error = 4;
  ClientIdentity client = 5;
}

message VoiceWakeProfile {
  string schema_version = 1;
  string profile_id = 2;
  repeated string trigger_words = 3;
  int64 updated_at_ms = 4;
  string scope = 5;
  string source = 6;
  string wake_mode = 7;
  bool requires_pairing_ready = 8;
  string audit_ref = 9;
}

message VoiceWakeProfileChanged {
  string schema_version = 1;
  string profile_id = 2;
  repeated string trigger_words = 3;
  int64 updated_at_ms = 4;
  string scope = 5;
  string source = 6;
  bool requires_pairing_ready = 7;
  string audit_ref = 8;
  string changed_by_device_id = 9;
  string changed_by_app_id = 10;
}

message HubEvent {
  string event_id = 1;
  int64 created_at_ms = 2;
  oneof ev {
    ModelsUpdated models_updated = 10;
    GrantDecision grant_decision = 11;
    QuotaUpdated quota_updated = 12;
    KillSwitchUpdated kill_switch_updated = 13;
    RequestStatus request_status = 14;
    VoiceWakeProfileChanged voice_wake_profile_changed = 15;
  }
}

message SubscribeRequest {
  ClientIdentity client = 1;
  repeated string scopes = 2; // "models|grants|quota|killswitch|requests|voicewake"
  string last_event_id = 3;   // resume cursor
}

message GetVoiceWakeProfileRequest {
  ClientIdentity client = 1;
  string desired_wake_mode = 2;
}

message GetVoiceWakeProfileResponse {
  VoiceWakeProfile profile = 1;
}

message SetVoiceWakeProfileRequest {
  ClientIdentity client = 1;
  VoiceWakeProfile profile = 2;
}

message SetVoiceWakeProfileResponse {
  VoiceWakeProfile profile = 1;
}

// -------------------- Runtime / Scheduler Observability --------------------

message SchedulerScopeInFlight {
  string scope_key = 1; // e.g. "project:<project_id>" | "device:<device_id>"
  int32 in_flight = 2;
}

message SchedulerScopeQueued {
  string scope_key = 1; // e.g. "project:<project_id>" | "device:<device_id>"
  int32 queued = 2;
}

message SchedulerQueueItem {
  string request_id = 1;
  string scope_key = 2;
  int64 enqueued_at_ms = 3;
  int64 queued_ms = 4;
}

message PaidAISchedulerStatus {
  int64 updated_at_ms = 1;
  int32 global_concurrency = 2;
  int32 per_project_concurrency = 3;
  int32 queue_limit = 4;
  int64 queue_timeout_ms = 5;

  int32 in_flight_total = 6;
  int32 queue_depth = 7;
  int64 oldest_queued_ms = 8;

  repeated SchedulerScopeInFlight in_flight_by_scope = 9;
  repeated SchedulerScopeQueued queued_by_scope = 10;
  repeated SchedulerQueueItem queue_items = 11; // optional: server MAY truncate
}

message GetSchedulerStatusRequest {
  ClientIdentity client = 1;
  bool include_queue_items = 2;
  int32 queue_items_limit = 3; // optional, default server-side cap
}

message GetSchedulerStatusResponse {
  PaidAISchedulerStatus paid_ai = 1;
}

message PendingGrantItem {
  string grant_request_id = 1;
  string request_id = 2;
  ClientIdentity client = 3;
  Capability capability = 4;
  string model_id = 5;
  string reason = 6;
  int32 requested_ttl_sec = 7;
  int64 requested_token_cap = 8;
  string status = 9;   // "pending|approved|denied"
  string decision = 10; // "queued|approved|denied|..."
  int64 created_at_ms = 11;
  int64 decided_at_ms = 12;
}

message GetPendingGrantRequestsRequest {
  ClientIdentity client = 1;
  string project_id = 2; // optional filter
  int32 limit = 3;       // optional, server-side bounded
}

message GetPendingGrantRequestsResponse {
  int64 updated_at_ms = 1;
  repeated PendingGrantItem items = 2;
}

message ConnectorIngressReceipt {
  string receipt_id = 1;
  string request_id = 2;
  string project_id = 3;
  string connector = 4;
  string target_id = 5;
  string ingress_type = 6;
  string channel_scope = 7;
  string source_id = 8;
  string message_id = 9;
  string dedupe_key = 10;
  int64 received_at_ms = 11;
  int64 event_sequence = 12;
  string delivery_state = 13;
  string runtime_state = 14;
}

message GetConnectorIngressReceiptsRequest {
  ClientIdentity client = 1;
  string project_id = 2; // optional filter
  int32 limit = 3;       // optional, server-side bounded
}

message GetConnectorIngressReceiptsResponse {
  int64 updated_at_ms = 1;
  repeated ConnectorIngressReceipt items = 2;
}

message AutonomyPolicyOverrideItem {
  string project_id = 1;
  string override_mode = 2;
  int64 updated_at_ms = 3;
  string reason = 4;
  string audit_ref = 5;
}

message GetAutonomyPolicyOverridesRequest {
  ClientIdentity client = 1;
  string project_id = 2; // optional filter
  int32 limit = 3;       // optional, server-side bounded
}

message GetAutonomyPolicyOverridesResponse {
  int64 updated_at_ms = 1;
  repeated AutonomyPolicyOverrideItem items = 2;
}

message ApprovePendingGrantRequestRequest {
  ClientIdentity client = 1;
  string grant_request_id = 2;
  int32 ttl_sec = 3;    // optional; defaults to original requested_ttl_sec
  int64 token_cap = 4;  // optional; defaults to original requested_token_cap
  string note = 5;      // optional operator note
}

message ApprovePendingGrantRequestResponse {
  string grant_request_id = 1;
  Grant grant = 2;
}

message DenyPendingGrantRequestRequest {
  ClientIdentity client = 1;
  string grant_request_id = 2;
  string reason = 3; // optional
}

message DenyPendingGrantRequestResponse {
  string grant_request_id = 1;
}

// -------------------- Audit --------------------

message AuditEvent {
  string schema_version = 1; // "audit.v1"
  string event_id = 2;
  string event_type = 3;    // e.g. "ai.generate.completed"
  int64 created_at_ms = 4;
  ClientIdentity actor = 5;
  string request_id = 6;
  Capability capability = 7;
  string model_id = 8;
  Usage usage = 9;
  bool network_allowed = 10;
  bool ok = 11;
  Error error = 12;
}

message ListAuditEventsRequest {
  ClientIdentity client = 1; // admin identity in practice
  int64 since_ms = 2;
  int64 until_ms = 3;
  string device_id = 4;
  string user_id = 5;
  string project_id = 6;
  string request_id = 7;
}

message ListAuditEventsResponse {
  repeated AuditEvent events = 1;
}

// -------------------- Memory (Hub-side) --------------------

// Thread is the unit of "conversation continuity" on Hub.
// In family mode this can map to (device_id, app_id, project_id).
message ThreadInfo {
  string thread_id = 1;
  ClientIdentity client = 2;
  string thread_key = 3; // optional client-provided key (e.g. "default")
  int64 created_at_ms = 4;
  int64 updated_at_ms = 5;
}

message GetOrCreateThreadRequest {
  ClientIdentity client = 1;
  string thread_key = 2; // optional; default "default"
}

message GetOrCreateThreadResponse {
  ThreadInfo thread = 1;
}

message AppendTurnsRequest {
  string request_id = 1;
  ClientIdentity client = 2;
  string thread_id = 3;
  repeated ChatMessage messages = 4;
  int64 created_at_ms = 5;
  // If false (recommended), Hub MUST drop/redact any content marked as private (e.g. <private>..</private>).
  bool allow_private = 6;
}

message AppendTurnsResponse {
  string thread_id = 1;
  int64 appended = 2;
}

message GetWorkingSetRequest {
  ClientIdentity client = 1;
  string thread_id = 2;
  int32 limit = 3; // number of most recent messages
}

message GetWorkingSetResponse {
  string thread_id = 1;
  repeated ChatMessage messages = 2; // chronological
}

message CanonicalMemoryItem {
  string item_id = 1;
  string scope = 2;   // "device|user|project|thread"
  string thread_id = 3;
  string key = 4;
  string value = 5;
  bool pinned = 6;
  int64 updated_at_ms = 7;
}

message UpsertCanonicalMemoryRequest {
  ClientIdentity client = 1;
  string scope = 2;   // "device|user|project|thread"
  string thread_id = 3;
  string key = 4;
  string value = 5;
  bool pinned = 6;
}

message UpsertCanonicalMemoryResponse {
  CanonicalMemoryItem item = 1;
}

message ListCanonicalMemoryRequest {
  ClientIdentity client = 1;
  string scope = 2;   // optional filter
  string thread_id = 3; // optional filter
  int32 limit = 4;
}

message ListCanonicalMemoryResponse {
  repeated CanonicalMemoryItem items = 1;
}

message MemoryRetrievalRequest {
  string schema_version = 1;
  string request_id = 2;
  ClientIdentity client = 3;
  string scope = 4;   // "current_project" in v1
  string requester_role = 5;
  string mode = 6;
  string project_id = 7;
  repeated string cross_project_target_ids = 8;
  string project_root = 9;
  string display_name = 10;
  string query = 11;
  string latest_user = 12;
  repeated string allowed_layers = 13;
  string retrieval_kind = 14; // "search|get_ref|drilldown"
  int32 max_results = 15;
  string reason = 16;
  bool require_explainability = 17;
  repeated string requested_kinds = 18;
  repeated string explicit_refs = 19;
  int32 max_snippets = 20;
  int32 max_snippet_chars = 21;
  string audit_ref = 22;
}

message MemoryRetrievalResultItem {
  string ref = 1;
  string source_kind = 2;
  string summary = 3;
  string snippet = 4;
  double score = 5;
  bool redacted = 6;
}

message MemoryRetrievalResponse {
  string schema_version = 1;
  string request_id = 2;
  string status = 3; // "ok|truncated|denied"
  string resolved_scope = 4;
  string source = 5;
  string scope = 6;
  string audit_ref = 7;
  string reason_code = 8;
  string deny_code = 9;
  repeated MemoryRetrievalResultItem results = 10;
  bool truncated = 11;
  int32 budget_used_chars = 12;
  int32 truncated_items = 13;
  int32 redacted_items = 14;
}

message ProjectLineageNode {
  string root_project_id = 1;
  string parent_project_id = 2; // empty when this node is the root
  string project_id = 3;
  string lineage_path = 4; // canonical path, e.g. "root/child/subchild"
  string parent_task_id = 5;
  int32 split_round = 6;
  string split_reason = 7;
  int32 child_index = 8;
  string status = 9; // active|archived
  int64 created_at_ms = 10;
  int64 updated_at_ms = 11;
}

message UpsertProjectLineageRequest {
  string request_id = 1; // idempotency key
  ClientIdentity client = 2;
  ProjectLineageNode lineage = 3;
  string expected_root_project_id = 4; // optional optimistic guard
}

message UpsertProjectLineageResponse {
  bool accepted = 1;
  bool created = 2;
  string deny_code = 3; // lineage_cycle_detected|lineage_parent_missing|lineage_root_mismatch|parent_inactive
  ProjectLineageNode lineage = 4;
}

message GetProjectLineageTreeRequest {
  ClientIdentity client = 1;
  string root_project_id = 2; // required
  string project_id = 3; // optional subtree root
  int32 max_depth = 4; // optional depth cap; <=0 means server default
  bool include_archived = 5;
}

message GetProjectLineageTreeResponse {
  string root_project_id = 1;
  repeated ProjectLineageNode nodes = 2;
  int64 generated_at_ms = 3;
}

message ProjectDispatchContext {
  string root_project_id = 1;
  string parent_project_id = 2;
  string project_id = 3;
  string assigned_agent_profile = 4;
  string parallel_lane_id = 5;
  string budget_class = 6;
  int32 queue_priority = 7;
  repeated string expected_artifacts = 8;
  int64 attached_at_ms = 9;
  string attach_source = 10; // x_terminal|scheduler|manual
}

message AttachDispatchContextRequest {
  string request_id = 1; // idempotency key
  ClientIdentity client = 2;
  ProjectDispatchContext dispatch = 3;
}

message AttachDispatchContextResponse {
  bool attached = 1;
  string deny_code = 2;
  ProjectDispatchContext dispatch = 3;
}

message ProjectHeartbeatState {
  string root_project_id = 1;
  string parent_project_id = 2;
  string project_id = 3;
  int32 lineage_depth = 4;
  int32 queue_depth = 5;
  int64 oldest_wait_ms = 6;
  repeated string blocked_reason = 7;
  repeated string next_actions = 8;
  string risk_tier = 9; // low|medium|high|critical
  int64 heartbeat_seq = 10;
  int64 sent_at_ms = 11;
  int64 received_at_ms = 12;
  int64 expires_at_ms = 13;
  bool conservative_only = 14;
}

message ProjectHeartbeatRequest {
  string request_id = 1; // idempotency key
  ClientIdentity client = 2;
  ProjectHeartbeatState heartbeat = 3;
}

message ProjectHeartbeatResponse {
  bool accepted = 1;
  bool created = 2;
  string deny_code = 3;
  ProjectHeartbeatState heartbeat = 4;
}

message DispatchPlanItem {
  string root_project_id = 1;
  string parent_project_id = 2;
  string project_id = 3;
  double priority_score = 4;
  repeated string prewarm_targets = 5;
  string batch_id = 6;
  string fairness_bucket = 7;
  int32 lineage_priority_boost = 8;
  string split_group_id = 9;
  string risk_tier = 10;
  bool conservative_only = 11;
  int32 queue_depth = 12;
  int64 oldest_wait_ms = 13;
}

message GetDispatchPlanRequest {
  string request_id = 1;
  ClientIdentity client = 2;
  string root_project_id = 3;
  int32 max_projects = 4;
}

message GetDispatchPlanResponse {
  bool planned = 1;
  string deny_code = 2;
  string batch_id = 3;
  int64 generated_at_ms = 4;
  bool conservative_mode = 5;
  repeated DispatchPlanItem items = 6;
}

message RiskTuningProfile {
  string profile_id = 1;
  string profile_label = 2;
  double vector_weight = 3;
  double text_weight = 4;
  double recency_weight = 5;
  double risk_weight = 6;
  double risk_penalty_low = 7;
  double risk_penalty_medium = 8;
  double risk_penalty_high = 9;
  double recall_floor = 10;
  double latency_ceiling_ratio = 11;
  double block_precision_floor = 12;
  double max_recall_drop = 13;
  double max_latency_ratio_increase = 14;
  double max_block_precision_drop = 15;
  double max_online_offline_drift = 16;
  int64 created_at_ms = 17;
  int64 updated_at_ms = 18;
}

message RiskTuningMetrics {
  double recall = 1;
  double p95_latency_ratio = 2;
  double block_precision = 3;
  double mean_final_score = 4;
}

message GetRiskTuningProfileRequest {
  ClientIdentity client = 1;
  string profile_id = 2; // optional; defaults to active profile
}

message GetRiskTuningProfileResponse {
  string active_profile_id = 1;
  string stable_profile_id = 2;
  RiskTuningProfile profile = 3;
  string latest_evaluation_id = 4;
  string latest_evaluation_decision = 5;
  string latest_deny_code = 6;
}

message EvaluateRiskTuningProfileRequest {
  string request_id = 1; // idempotency key
  ClientIdentity client = 2;
  RiskTuningProfile profile = 3;
  RiskTuningMetrics baseline_metrics = 4;
  RiskTuningMetrics holdout_metrics = 5;
  RiskTuningMetrics online_metrics = 6;
  RiskTuningMetrics offline_metrics = 7;
  bool auto_rollback_on_violation = 8;
}

message EvaluateRiskTuningProfileResponse {
  string evaluation_id = 1;
  string profile_id = 2;
  bool accepted = 3;
  bool holdout_passed = 4;
  bool rollback_triggered = 5;
  string rollback_to_profile_id = 6;
  string deny_code = 7;
  string decision = 8;
}

message PromoteRiskTuningProfileRequest {
  string request_id = 1; // idempotency key
  ClientIdentity client = 2;
  string profile_id = 3;
  bool rollback_on_violation = 4;
  string expected_active_profile_id = 5; // optional optimistic guard
}

message PromoteRiskTuningProfileResponse {
  bool promoted = 1;
  bool rollback_triggered = 2;
  string active_profile_id = 3;
  string previous_active_profile_id = 4;
  string deny_code = 5;
}

message VoiceGrantChallenge {
  string challenge_id = 1;
  string template_id = 2;
  string action_digest = 3;
  string scope_digest = 4;
  string amount_digest = 5;
  string challenge_code = 6;
  string risk_level = 7; // low|medium|high
  bool requires_mobile_confirm = 8;
  bool allow_voice_only = 9;
  string bound_device_id = 10;
  string mobile_terminal_id = 11;
  int64 issued_at_ms = 12;
  int64 expires_at_ms = 13;
}

message IssueVoiceGrantChallengeRequest {
  string request_id = 1; // idempotency key
  ClientIdentity client = 2;
  string template_id = 3;
  string action_digest = 4;
  string scope_digest = 5;
  string amount_digest = 6;
  string challenge_code = 7; // optional; server may auto-generate
  string risk_level = 8; // low|medium|high
  string bound_device_id = 9;
  string mobile_terminal_id = 10;
  bool allow_voice_only = 11;
  bool requires_mobile_confirm = 12;
  int64 ttl_ms = 13; // bounded by server policy
}

message IssueVoiceGrantChallengeResponse {
