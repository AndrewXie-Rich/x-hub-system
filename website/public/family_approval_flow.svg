<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Family approval flow with X-Hub</title>
  <desc id="desc">Five-step flow: kid's device requests an action; X-Hub policy classifies as needs confirmation; parent's phone receives a push; parent approves or denies; a signed receipt is recorded either way.</desc>
  <defs>
    <marker id="fa-arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#475569" />
    </marker>
    <marker id="fa-arrow-green" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#1f7a4d" />
    </marker>
    <marker id="fa-arrow-red" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#b42318" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 14; ry: 14; }
      .kid-card { fill: #f0fdf4; stroke: #5ca77a; stroke-width: 1.6; rx: 14; ry: 14; }
      .ai-card { fill: #fffaf2; stroke: #d4a048; stroke-width: 1.6; rx: 14; ry: 14; }
      .hub-card { fill: #f5fbf7; stroke: #6aa37d; stroke-width: 2; rx: 14; ry: 14; }
      .phone-card { fill: #eef7ff; stroke: #7aa7d9; stroke-width: 1.6; rx: 14; ry: 14; }
      .allow-card { fill: #f0fdf4; stroke: #2f8a4f; stroke-width: 1.6; rx: 14; ry: 14; }
      .deny-card { fill: #fff1f2; stroke: #c2410c; stroke-width: 1.6; rx: 14; ry: 14; }
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .step-num { font: 700 12px Arial, sans-serif; letter-spacing: 0.15em; fill: #64748b; }
      .card-title { font: 700 15px Arial, sans-serif; fill: #1f2937; }
      .card-copy { font: 500 12.5px Arial, sans-serif; fill: #475569; }
      .mono { font: 600 12px 'SF Mono', Menlo, monospace; fill: #334155; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="460" />
  <text class="title" x="40" y="44">From kid's prompt to parent's tap — one path, signed both ways.</text>

  <!-- Step 1: Kid's device -->
  <rect class="kid-card" x="40" y="100" width="200" height="160" />
  <text class="step-num" x="56" y="124">STEP 1</text>
  <text class="card-title" x="56" y="148">Kid's device</text>
  <text class="card-copy" x="56" y="172">Kid asks the AI:</text>
  <text class="mono" x="56" y="196">"clean up the</text>
  <text class="mono" x="56" y="214">Downloads folder"</text>
  <text class="card-copy" x="56" y="242">Any client. iPad, laptop, web.</text>

  <line x1="248" y1="180" x2="288" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#fa-arrow)" />

  <!-- Step 2: AI plans an action -->
  <rect class="ai-card" x="296" y="100" width="200" height="160" />
  <text class="step-num" x="312" y="124">STEP 2</text>
  <text class="card-title" x="312" y="148">AI plans an action</text>
  <text class="card-copy" x="312" y="172">Agent generates:</text>
  <text class="mono" x="312" y="196">rm -rf ~/Downloads/</text>
  <text class="card-copy" x="312" y="220">Old photos? Receipts?</text>
  <text class="card-copy" x="312" y="238">School papers? AI doesn't</text>
  <text class="card-copy" x="312" y="256">know either.</text>

  <line x1="504" y1="180" x2="544" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#fa-arrow)" />

  <!-- Step 3: Hub policy gate -->
  <rect class="hub-card" x="552" y="100" width="200" height="160" />
  <text class="step-num" x="568" y="124">STEP 3</text>
  <text class="card-title" x="568" y="148">Hub policy gate</text>
  <text class="card-copy" x="568" y="172">Classified as:</text>
  <text class="mono" x="568" y="196">dual_confirm</text>
  <text class="card-copy" x="568" y="220">Matches pattern:</text>
  <text class="mono" x="568" y="244">^rm|delete</text>

  <line x1="760" y1="180" x2="800" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#fa-arrow)" />

  <!-- Step 4: Parent's phone -->
  <rect class="phone-card" x="808" y="100" width="220" height="160" />
  <text class="step-num" x="824" y="124">STEP 4</text>
  <text class="card-title" x="824" y="148">Parent's phone</text>
  <text class="card-copy" x="824" y="172">Push notification:</text>
  <text class="mono" x="824" y="196">"Allow DELETE</text>
  <text class="mono" x="824" y="214">~/Downloads/?"</text>
  <text class="card-copy" x="824" y="242">Touch ID required.</text>

  <!-- Two branches -->
  <line x1="1028" y1="160" x2="1068" y2="120" stroke="#1f7a4d" stroke-width="2" marker-end="url(#fa-arrow-green)" />
  <line x1="1028" y1="220" x2="1068" y2="260" stroke="#b42318" stroke-width="2" marker-end="url(#fa-arrow-red)" />

  <!-- Step 5a: Approve -->
  <rect class="allow-card" x="1076" y="80" width="100" height="80" />
  <text class="step-num" x="1086" y="102">APPROVE</text>
  <text class="card-copy" x="1086" y="124">Action runs.</text>
  <text class="card-copy" x="1086" y="142">Signed receipt.</text>

  <!-- Step 5b: Deny -->
  <rect class="deny-card" x="1076" y="220" width="100" height="80" />
  <text class="step-num" x="1086" y="242">DENY</text>
  <text class="card-copy" x="1086" y="264">Blocked.</text>
  <text class="card-copy" x="1086" y="282">Signed receipt.</text>

  <!-- Footnote -->
  <text class="card-copy" x="40" y="330" font-style="italic">Both branches produce a signed receipt — verifiable outside X-Hub. The parent can read</text>
  <text class="card-copy" x="40" y="350" font-style="italic">why something was blocked (or allowed) without watching every chat in real time.</text>

  <text class="card-copy" x="40" y="400">Notify-tier actions (git commit, save file) run silently with a log line.</text>
  <text class="card-copy" x="40" y="420">Dual-confirm actions (delete entire folder, send payment) require two distinct adult approvers.</text>
</svg>
