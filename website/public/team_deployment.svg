<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Team deployment around an X-Hub</title>
  <desc id="desc">Architecture diagram showing AI tools (Cursor, Claude Code, ChatGPT, Slack) routing through a self-hosted X-Hub which enforces multi-user roles (admin, operator, observer), then onward to local and paid models, with SIEM audit, signed receipts, and compliance reports as outputs.</desc>
  <defs>
    <marker id="td-arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#475569" />
    </marker>
    <marker id="td-arrow-green" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#1f7a4d" />
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .hub-panel { fill: #f5fbf7; stroke: #6aa37d; stroke-width: 2; rx: 18; ry: 18; }
      .role-card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.3; rx: 12; ry: 12; }
      .role-admin { fill: #fff5f5; stroke: #d77b7b; stroke-width: 1.5; rx: 12; ry: 12; }
      .role-operator { fill: #fffaf2; stroke: #d4a048; stroke-width: 1.5; rx: 12; ry: 12; }
      .role-observer { fill: #eef7ff; stroke: #7aa7d9; stroke-width: 1.5; rx: 12; ry: 12; }
      .client-card { fill: #f0fdf4; stroke: #5ca77a; stroke-width: 1.4; rx: 12; ry: 12; }
      .model-card { fill: #fffaf2; stroke: #d4a048; stroke-width: 1.4; rx: 12; ry: 12; }
      .output-card { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.4; rx: 12; ry: 12; }
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .panel-title { font: 700 13px Arial, sans-serif; letter-spacing: 0.15em; fill: #1f7a4d; }
      .section-title { font: 700 12px Arial, sans-serif; letter-spacing: 0.15em; fill: #64748b; }
      .card-title { font: 700 14px Arial, sans-serif; fill: #1f2937; }
      .card-copy { font: 500 11.5px Arial, sans-serif; fill: #475569; }
      .center-title { font: 700 26px Arial, sans-serif; fill: #1f7a4d; text-anchor: middle; }
      .center-copy { font: 500 13px Arial, sans-serif; fill: #1f7a4d; text-anchor: middle; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="720" />
  <text class="title" x="40" y="44">One self-hosted Hub between your team and every AI tool.</text>

  <!-- Clients column (left) -->
  <text class="section-title" x="40" y="100">CLIENTS YOUR TEAM ALREADY USES</text>
  <rect class="client-card" x="40" y="120" width="200" height="60" />
  <text class="card-title" x="56" y="146">Cursor / VS Code</text>
  <text class="card-copy" x="56" y="166">Each developer's IDE</text>

  <rect class="client-card" x="40" y="200" width="200" height="60" />
  <text class="card-title" x="56" y="226">Claude Code / Aider</text>
  <text class="card-copy" x="56" y="246">Terminal-side coding agent</text>

  <rect class="client-card" x="40" y="280" width="200" height="60" />
  <text class="card-title" x="56" y="306">ChatGPT / Claude web</text>
  <text class="card-copy" x="56" y="326">Browser-based AI</text>

  <rect class="client-card" x="40" y="360" width="200" height="60" />
  <text class="card-title" x="56" y="386">Slack / Teams</text>
  <text class="card-copy" x="56" y="406">Operator-channel AI</text>

  <rect class="client-card" x="40" y="440" width="200" height="60" />
  <text class="card-title" x="56" y="466">Custom MCP servers</text>
  <text class="card-copy" x="56" y="486">Internal tools, vendor plugins</text>

  <!-- Arrows from clients to hub -->
  <line x1="248" y1="150" x2="430" y2="270" stroke="#475569" stroke-width="1.5" marker-end="url(#td-arrow)" />
  <line x1="248" y1="230" x2="430" y2="290" stroke="#475569" stroke-width="1.5" marker-end="url(#td-arrow)" />
  <line x1="248" y1="310" x2="430" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#td-arrow)" />
  <line x1="248" y1="390" x2="430" y2="330" stroke="#475569" stroke-width="1.5" marker-end="url(#td-arrow)" />
  <line x1="248" y1="470" x2="430" y2="350" stroke="#475569" stroke-width="1.5" marker-end="url(#td-arrow)" />

  <!-- Hub panel (center) -->
  <rect class="hub-panel" x="440" y="180" width="320" height="260" />
  <text class="panel-title" x="600" y="208" text-anchor="middle">X-HUB (SELF-HOSTED)</text>
  <text class="center-title" x="600" y="246">One control plane</text>
  <text class="center-copy" x="600" y="272">Policy gate · Memory truth</text>
  <text class="center-copy" x="600" y="292">Grants · Audit · Route truth</text>
  <text class="center-copy" x="600" y="312">Skill trust · Quota</text>

  <!-- Three role badges inside hub panel -->
  <rect class="role-admin" x="460" y="340" width="92" height="76" />
  <text class="card-title" x="506" y="362" text-anchor="middle">admin</text>
  <text class="card-copy" x="506" y="380" text-anchor="middle">set policy</text>
  <text class="card-copy" x="506" y="394" text-anchor="middle">manage users</text>
  <text class="card-copy" x="506" y="408" text-anchor="middle">revoke devices</text>

  <rect class="role-operator" x="554" y="340" width="92" height="76" />
  <text class="card-title" x="600" y="362" text-anchor="middle">operator</text>
  <text class="card-copy" x="600" y="380" text-anchor="middle">use AI tools</text>
  <text class="card-copy" x="600" y="394" text-anchor="middle">grant scoped</text>
  <text class="card-copy" x="600" y="408" text-anchor="middle">caps to clients</text>

  <rect class="role-observer" x="648" y="340" width="92" height="76" />
  <text class="card-title" x="694" y="362" text-anchor="middle">observer</text>
  <text class="card-copy" x="694" y="380" text-anchor="middle">read-only</text>
  <text class="card-copy" x="694" y="394" text-anchor="middle">audit access</text>
  <text class="card-copy" x="694" y="408" text-anchor="middle">no execution</text>

  <!-- Models column (right top) -->
  <text class="section-title" x="780" y="100">MODELS</text>
  <rect class="model-card" x="780" y="120" width="180" height="60" />
  <text class="card-title" x="796" y="146">Local (Transformers / MLX)</text>
  <text class="card-copy" x="796" y="166">Sensitive workloads</text>

  <rect class="model-card" x="780" y="200" width="180" height="60" />
  <text class="card-title" x="796" y="226">Claude (Anthropic)</text>
  <text class="card-copy" x="796" y="246">Quota-aware paid route</text>

  <rect class="model-card" x="780" y="280" width="180" height="60" />
  <text class="card-title" x="796" y="306">GPT / Gemini / etc.</text>
  <text class="card-copy" x="796" y="326">Same route truth, same audit</text>

  <line x1="765" y1="290" x2="780" y2="150" stroke="#1f7a4d" stroke-width="1.5" marker-end="url(#td-arrow-green)" />
  <line x1="765" y1="310" x2="780" y2="230" stroke="#1f7a4d" stroke-width="1.5" marker-end="url(#td-arrow-green)" />
  <line x1="765" y1="330" x2="780" y2="310" stroke="#1f7a4d" stroke-width="1.5" marker-end="url(#td-arrow-green)" />

  <!-- Outputs (right bottom) -->
  <text class="section-title" x="780" y="380">OUTPUTS</text>
  <rect class="output-card" x="780" y="400" width="180" height="60" />
  <text class="card-title" x="796" y="426">SIEM audit (JSONL)</text>
  <text class="card-copy" x="796" y="446">Splunk / Datadog / Elastic</text>

  <rect class="output-card" x="780" y="480" width="180" height="60" />
  <text class="card-title" x="796" y="506">Hub Receipts</text>
  <text class="card-copy" x="796" y="526">Embeddable in git commits</text>

  <rect class="output-card" x="780" y="560" width="180" height="60" />
  <text class="card-title" x="796" y="586">Compliance reports</text>
  <text class="card-copy" x="796" y="606">EU AI Act / ISO 42001</text>

  <line x1="765" y1="380" x2="780" y2="430" stroke="#475569" stroke-width="1.5" marker-end="url(#td-arrow)" />
  <line x1="765" y1="400" x2="780" y2="510" stroke="#475569" stroke-width="1.5" marker-end="url(#td-arrow)" />
  <line x1="765" y1="420" x2="780" y2="590" stroke="#475569" stroke-width="1.5" marker-end="url(#td-arrow)" />

  <!-- Footnote -->
  <text class="card-copy" x="40" y="660" font-style="italic">Every call from every client, by every team member, on every model, produces a verifiable signed receipt.</text>
  <text class="card-copy" x="40" y="680" font-style="italic">When the auditor asks "what did Engineering do last quarter," the answer is one query, not three chat-history exports.</text>
</svg>
